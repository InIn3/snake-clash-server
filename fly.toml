[build]

[http_service]
  internal_port = 10000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

[[http_service.checks]]
  grace_period = "10s"
  interval = "30s"
  method = "GET"
  path = "/health"
  timeout = "5s"

[env]
  PORT = "10000"
  NODE_ENV = "production"
  BASE_SEPOLIA_RPC_URL = "https://sepolia.base.org"
  CHAIN_ID = "84532"
  CORS_ORIGINS = "http://localhost:3000,https://frontend-alpha-three-18.vercel.app"

[[vm]]
  memory = "256mb"
  cpu_kind = "shared"
  cpus = 1
